<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Brown background (Minecraft dirt) -->
  <rect width="512" height="512" fill="#8B6914"/>

  <!-- Pickaxe handle -->
  <rect x="240" y="120" width="32" height="320" fill="#3b2507"/>

  <!-- Pickaxe head - green blocks in L shape -->
  <g fill="#4ade80" stroke="#22c55e" stroke-width="4">
    <!-- Top-left block -->
    <rect x="100" y="100" width="80" height="80"/>
    <!-- Top-middle block -->
    <rect x="180" y="100" width="80" height="80"/>
    <!-- Top-right block -->
    <rect x="260" y="100" width="80" height="80"/>
    <!-- Bottom-right block -->
    <rect x="260" y="180" width="80" height="80"/>
  </g>
</svg>
